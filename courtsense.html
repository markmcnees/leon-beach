<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CourtSense IQ — Level 1</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e4002b;--dark-red:#b5001f;--cream:#f7f4f0;--gold:#d4a843;--dark:#1a1a1a;--light:#888;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;}
header{background:#111;padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:3px solid var(--gold);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:25px;letter-spacing:2px;color:#fff;line-height:1;}
.logo span{color:var(--gold);}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.hdr-spc{flex:1;}
.score-badge{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 13px;text-align:center;}
.score-badge .snum{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;line-height:1;}
.score-badge .slbl{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;}
.level-strip{background:#0d0d0d;border-bottom:1px solid #1e1e1e;padding:6px 16px;display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.lpip{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.lpip.off{background:#252525;}
.prog-wrap{background:#080808;height:4px;}
.prog-bar{height:4px;background:linear-gradient(90deg,var(--gold),var(--red));transition:width .5s ease;}
.app{max-width:600px;margin:0 auto;padding:16px 13px 60px;}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.q-cat{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;padding:3px 9px;border-radius:3px;text-transform:uppercase;}
.q-num{margin-left:auto;font-size:12px;color:var(--light);}
.scenario-text{font-size:14px;font-weight:500;line-height:1.55;margin-bottom:13px;color:#ccc;}
/* COURT */
#court-wrap{position:relative;width:100%;max-width:400px;margin:0 auto 5px;touch-action:none;}
#court-svg{display:block;width:100%;}
#arrow-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:11;overflow:visible;}
/* TOKENS */
.token{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;color:#fff;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;transform:translate(-50%,-50%);border:2.5px solid #fff;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.6);transition:box-shadow .12s,border-color .12s;}
.token:active{cursor:grabbing;}
.token.player-tok{width:46px;height:46px;font-size:11px;}
.token.player-tok .tok-lbl{font-size:12px;line-height:1;}
.token.player-tok .tok-sub{font-family:'Barlow Condensed',sans-serif;font-size:7px;letter-spacing:1px;opacity:.8;line-height:1;margin-top:1px;}
.token.ball-tok{width:38px;height:38px;background:#fffde7 !important;border-color:#c8a820;color:#5a3e00;}
.token.ball-tok .tok-lbl{font-size:18px;line-height:1;}
.token.ball-tok .tok-sub{display:none;}
.token.on-court{box-shadow:0 0 0 3px rgba(255,255,255,.3),0 2px 14px rgba(0,0,0,.7);}
.token.result-correct{border-color:#4caf50 !important;box-shadow:0 0 0 3px rgba(76,175,80,.5)!important;}
.token.result-wrong{border-color:#e4002b !important;box-shadow:0 0 0 3px rgba(228,0,43,.5)!important;}
.token.frozen{cursor:default;pointer-events:none;}
/* UI */
.instruct-box{background:#131318;border:1px solid #252525;border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:13px;font-size:13px;color:#aaa;line-height:1.5;}
.instruct-box strong{color:var(--gold);}
.place-status{display:flex;gap:7px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}
.place-pip{background:#191919;border:1px solid #2e2e2e;border-radius:20px;padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:#484848;text-transform:uppercase;transition:all .2s;}
.place-pip.placed{border-color:var(--gold);color:var(--gold);}
.confirm-btn{display:block;width:100%;background:#191919;border:2px solid #2e2e2e;border-radius:8px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#383838;cursor:not-allowed;transition:all .2s;margin-bottom:15px;}
.confirm-btn.ready{background:var(--red);border-color:var(--red);color:#fff;cursor:pointer;}
.confirm-btn.ready:hover{background:var(--dark-red);}
.placement-banner{display:none;border-radius:8px;padding:12px 15px;margin-bottom:15px;font-size:13px;line-height:1.6;}
.placement-banner.show{display:block;animation:fadeUp .3s ease;}
.placement-banner.all-correct{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.28);}
.placement-banner.partial{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.22);}
.placement-banner.all-wrong{background:rgba(228,0,43,.07);border:1px solid rgba(228,0,43,.18);}
.placement-banner .pb-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;font-weight:700;text-transform:uppercase;margin-bottom:6px;}
.hint-row{display:flex;gap:8px;align-items:flex-start;margin-top:5px;font-size:12px;color:#bbb;}
.hint-icon{flex-shrink:0;font-size:14px;}
.question-text{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;color:#fff;margin-bottom:11px;line-height:1.35;}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:13px;}
.choice-btn{background:#1c1c1c;border:2px solid #2a2a2a;border-radius:9px;padding:12px 13px;text-align:left;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:10px;color:var(--cream);font-family:'Barlow',sans-serif;font-size:14px;font-weight:500;line-height:1.4;}
.choice-btn:hover:not(:disabled){border-color:var(--gold);background:#232318;transform:translateX(3px);}
.choice-ltr{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);min-width:16px;margin-top:-1px;flex-shrink:0;}
.choice-icon{margin-left:auto;font-size:15px;display:none;flex-shrink:0;}
.choice-btn.correct{border-color:#4caf50;background:rgba(76,175,80,.1);}
.choice-btn.correct .choice-icon,.choice-btn.wrong .choice-icon{display:block;}
.choice-btn.correct .choice-ltr{color:#4caf50;}
.choice-btn.wrong{border-color:var(--red);background:rgba(228,0,43,.07);}
.choice-btn.wrong .choice-ltr{color:var(--red);}
.choice-btn.dimmed{opacity:.28;}
.choice-btn:disabled{cursor:default;transform:none!important;}
.explanation{display:none;background:#141420;border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;line-height:1.65;color:#bbb;margin-bottom:14px;}
.explanation.show{display:block;animation:fadeUp .3s ease;}
.explanation strong{color:var(--gold);}
.explanation em{color:#ddd;font-style:normal;font-weight:600;}
.next-btn{display:none;background:var(--red);color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;width:100%;transition:background .2s;}
.next-btn:hover{background:var(--dark-red);}
.next-btn.show{display:block;animation:fadeUp .25s ease;}
/* LEGEND */
.legend-panel{background:#101010;border:1px solid #1e1e1e;border-radius:8px;padding:12px 14px;margin-bottom:11px;font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#888;}
.legend-title{color:var(--gold);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:11px;margin-bottom:8px;}
.legend-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;color:#aaa;line-height:1.3;}
.lsvg{flex-shrink:0;}
.divider{border-top:1px solid #1e1e1e;margin:9px 0;}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px;margin-top:5px;}
.zone-item{display:flex;align-items:center;gap:7px;}
.zone-num{color:var(--gold);font-weight:700;font-size:13px;min-width:36px;}
/* RESULT */
.result-screen{display:none;text-align:center;padding:10px 0 20px;}
.result-screen.show{display:block;animation:fadeUp .5s ease;}
.result-grade{font-family:'Bebas Neue',sans-serif;font-size:88px;line-height:1;color:var(--gold);text-shadow:0 0 50px rgba(212,168,67,.28);}
.result-label{font-family:'Barlow Condensed',sans-serif;font-size:20px;letter-spacing:3px;text-transform:uppercase;color:var(--cream);margin:4px 0 5px;}
.result-sub{font-size:13px;color:var(--light);margin-bottom:22px;line-height:1.5;}
.result-breakdown{background:#0f0f0f;border:1px solid #1e1e1e;border-radius:10px;padding:18px;margin-bottom:20px;text-align:left;}
.result-breakdown h3{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:13px;}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12px;}
.cat-name{color:#888;min-width:130px;font-family:'Barlow Condensed',sans-serif;}
.cat-bar-wrap{flex:1;background:#181818;border-radius:4px;height:7px;}
.cat-bar{height:7px;border-radius:4px;transition:width 1s ease;}
.cat-score{color:var(--cream);min-width:36px;text-align:right;font-weight:700;}
.retry-btn{background:transparent;border:2px solid var(--gold);color:var(--gold);border-radius:8px;padding:13px 28px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.retry-btn:hover{background:var(--gold);color:var(--dark);}
.q-wrap{animation:fadeUp .32s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:480px){.scenario-text{font-size:13px;}.question-text{font-size:16px;}.choice-btn{font-size:13px;padding:11px 12px;}.result-grade{font-size:70px;}}
</style>
</head>
<body>
<header>
  <div><div class="logo">Court<span>Sense</span> IQ</div><div class="logo-sub">Beach Volleyball · Level 1</div></div>
  <div class="hdr-spc"></div>
  <div class="score-badge"><div class="snum" id="score-display">0</div><div class="slbl">pts</div></div>
</header>
<div class="level-strip"><div class="lpip"></div>LEVEL 1 — FUNDAMENTALS<div class="lpip off" style="margin-left:6px"></div><div class="lpip off"></div></div>
<div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
<div class="app" id="app"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────
const W=260,H=360;  // SVG viewBox
const YOUR='#e4002b', OPP='#1565C0', GOLD='#d4a843';
// Opponents are clamped to y≤160 — well behind net at y=180
const OPP_MAX_Y = 160;

// ── WIND ──────────────────────────────────────────────────────
function windSVG(dir,str){
  const cols={light:'#87ceeb',mod:'#5ba8e0',strong:'#2070c0'};
  const col=cols[str]||'#87ceeb';
  const lws={light:1.2,mod:1.8,strong:2.6};
  const lw=lws[str]||1.5;
  const lbl={light:'LIGHT',mod:'MODERATE',strong:'STRONG'}[str]||'';
  const dm={right:{dx:1,dy:0},left:{dx:-1,dy:0},toward:{dx:0,dy:1},away:{dx:0,dy:-1}};
  const dv=dm[dir]||dm.right;
  const len=27,ox=220,oy=32;
  const x2=ox+dv.dx*len,y2=oy+dv.dy*len;
  const ux=dv.dx,uy=dv.dy,hx=x2-ux*9,hy=y2-uy*9;
  const cnt=str==='strong'?3:str==='mod'?2:1;
  let ls='';
  for(let i=0;i<cnt;i++){const o=(i-(cnt-1)/2)*3.5,px=-uy*o,py=ux*o;ls+=`<line x1="${ox+px}" y1="${oy+py}" x2="${hx+px}" y2="${hy+py}" stroke="${col}" stroke-width="${lw}" opacity=".85"/>`;}
  return `<g>
    <rect x="192" y="18" width="64" height="28" rx="4" fill="rgba(0,0,0,.55)"/>
    <text x="224" y="27" text-anchor="middle" fill="${col}" font-size="7.5" font-family="Barlow Condensed" font-weight="700" letter-spacing="1">WIND</text>
    <text x="224" y="37" text-anchor="middle" fill="${col}" font-size="7" font-family="Barlow Condensed">${lbl}</text>
    ${ls}<polygon points="${x2},${y2} ${hx-uy*4},${hy+ux*4} ${hx+uy*4},${hy-ux*4}" fill="${col}" opacity=".9"/>
  </g>`;
}

// ── COURT SVG ─────────────────────────────────────────────────
function buildCourtSVG(q,overlays=[]){
  const court=`
  <defs><pattern id="sp" width="5" height="5" patternUnits="userSpaceOnUse">
    <rect width="5" height="5" fill="#b89a62"/>
    <circle cx="1.2" cy="1.2" r=".5" fill="#a07840" opacity=".4"/>
    <circle cx="3.5" cy="3.8" r=".35" fill="#ccb06a" opacity=".35"/>
  </pattern></defs>
  <rect width="${W}" height="${H}" fill="url(#sp)" rx="3"/>
  <rect x="20" y="20" width="${W-40}" height="${H-40}" fill="none" stroke="#fff" stroke-width="2.5" rx="2"/>
  <line x1="20" y1="180" x2="${W-20}" y2="180" stroke="#1a1a1a" stroke-width="7"/>
  <line x1="20" y1="180" x2="${W-20}" y2="180" stroke="#e8c840" stroke-width="2.5" stroke-dasharray="7,4" opacity=".85"/>
  <line x1="20" y1="174" x2="20" y2="186" stroke="#dd3333" stroke-width="3" opacity=".8"/>
  <line x1="${W-20}" y1="174" x2="${W-20}" y2="186" stroke="#dd3333" stroke-width="3" opacity=".8"/>
  <line x1="20" y1="126" x2="${W-20}" y2="126" stroke="#fff" stroke-width="1" stroke-dasharray="4,4" opacity=".2"/>
  <line x1="20" y1="234" x2="${W-20}" y2="234" stroke="#fff" stroke-width="1" stroke-dasharray="4,4" opacity=".2"/>
  <line x1="${W/2}" y1="20" x2="${W/2}" y2="${H-20}" stroke="#fff" stroke-width=".8" opacity=".1"/>
  <text x="${W/2}" y="13" text-anchor="middle" fill="#666" font-size="8" font-family="Barlow Condensed" letter-spacing="1">OPPONENT'S SIDE</text>
  <text x="${W/2}" y="${H-4}" text-anchor="middle" fill="#666" font-size="8" font-family="Barlow Condensed" letter-spacing="1">YOUR SIDE</text>`;

  const wind=q.wind?windSVG(q.wind[0],q.wind[1]):'';
  const decs=(q.decs||[]).map(renderDec).join('');
  // Render opps — always clamped behind net
  const opps=(q.opps||[]).map(o=>{
    const oy=Math.min(o.y, OPP_MAX_Y);
    return oppCircle(o.x,oy,o.lbl,o.sub||'',o.down||false);
  }).join('');
  return `<svg id="court-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%">
    ${court}${wind}${decs}${opps}${overlays.join('')}
  </svg>`;
}

function renderDec(d){
  if(d.t==='arrow'){
    const dx=d.x2-d.x1,dy=d.y2-d.y1,len=Math.sqrt(dx*dx+dy*dy);
    if(len<2) return '';
    const ux=dx/len,uy=dy/len,hx=d.x2-ux*11,hy=d.y2-uy*11;
    const da=d.dsh?'stroke-dasharray="6,3"':'';
    return `<g>
      <line x1="${d.x1}" y1="${d.y1}" x2="${hx}" y2="${hy}" stroke="${d.c||'#fff'}" stroke-width="1.8" ${da} opacity=".9"/>
      <polygon points="${d.x2},${d.y2} ${hx-uy*4},${hy+ux*4} ${hx+uy*4},${hy-ux*4}" fill="${d.c||'#fff'}" opacity=".9"/>
    </g>`;
  }
  if(d.t==='zone'){
    // No labels — just colored transparent zone
    return `<rect x="${d.x}" y="${d.y}" width="${d.w}" height="${d.h}" fill="${d.c}" opacity="${d.op||.15}" rx="3"/>`;
  }
  if(d.t==='ball'){
    return ballSVGEl(d.x,d.y);
  }
  if(d.t==='playerdown'){
    return playerDownSVG(d.x,d.y,OPP,d.lbl||'');
  }
  return '';
}

function ballSVGEl(x,y){
  return `<g>
    <circle cx="${x}" cy="${y}" r="7" fill="#fffde7" stroke="#c8a820" stroke-width="1.5"/>
    <ellipse cx="${x}" cy="${y}" rx="4" ry="7" fill="none" stroke="#c8a820" stroke-width=".7" opacity=".5"/>
    <ellipse cx="${x}" cy="${y}" rx="7" ry="3.5" fill="none" stroke="#c8a820" stroke-width=".7" opacity=".5"/>
  </g>`;
}

function playerDownSVG(x,y,color,lbl){
  const sy=Math.min(y, OPP_MAX_Y);
  return `<g>
    <ellipse cx="${x}" cy="${sy}" rx="20" ry="10" fill="${color}" stroke="#fff" stroke-width="1.8" opacity=".85"/>
    <text x="${x}" y="${sy+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="7" font-family="Barlow Condensed" font-weight="700">${lbl}</text>
    <text x="${x}" y="${sy+20}" text-anchor="middle" fill="${color}" font-size="7" font-family="Barlow Condensed" font-weight="700">▼DOWN</text>
  </g>`;
}

function oppCircle(x,y,lbl,sub,down){
  if(down) return playerDownSVG(x,y,OPP,lbl);
  return `<g>
    <circle cx="${x}" cy="${y}" r="12" fill="${OPP}" stroke="#fff" stroke-width="2"/>
    <text x="${x}" y="${y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="7.5" font-family="Barlow Condensed" font-weight="700">${lbl}</text>
    ${sub?`<text x="${x}" y="${y+21}" text-anchor="middle" fill="${OPP}" font-size="7.5" font-family="Barlow Condensed" font-weight="600">${sub}</text>`:''}
  </g>`;
}

function placementOverlay(leon,svgX,svgY,ok){
  const {cx,cy}=leon,els=[];
  if(ok){
    // User placed correctly — green glow ring + checkmark at their position
    els.push(`<circle cx="${cx}" cy="${cy}" r="22" fill="#4caf50" opacity=".12"/>`);
    els.push(`<circle cx="${cx}" cy="${cy}" r="20" fill="none" stroke="#4caf50" stroke-width="2.5" opacity=".95"/>`);
    els.push(`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="#4caf50" font-size="17" font-weight="bold">✓</text>`);
  } else {
    // Show WHERE THEY PLACED IT (red X ring at their position)
    if(svgX!==null){
      els.push(`<circle cx="${svgX}" cy="${svgY}" r="21" fill="#e4002b" opacity=".12"/>`);
      els.push(`<circle cx="${svgX}" cy="${svgY}" r="20" fill="none" stroke="#e4002b" stroke-width="2" stroke-dasharray="4,3" opacity=".85"/>`);
      els.push(`<text x="${svgX}" y="${svgY+1}" text-anchor="middle" dominant-baseline="middle" fill="#e4002b" font-size="15" font-weight="bold">✗</text>`);
      els.push(`<text x="${svgX}" y="${svgY-27}" text-anchor="middle" fill="#e4002b" font-size="7.5" font-family="Barlow Condensed" font-weight="700">YOUR PLACEMENT</text>`);
    }
    // Show IDEAL POSITION (green filled ghost + label)
    els.push(`<circle cx="${cx}" cy="${cy}" r="22" fill="#4caf50" opacity=".15"/>`);
    els.push(`<circle cx="${cx}" cy="${cy}" r="20" fill="none" stroke="#4caf50" stroke-width="2.5" opacity=".95"/>`);
    els.push(`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="#4caf50" font-size="10" font-family="Barlow Condensed" font-weight="700">${leon.lbl}</text>`);
    els.push(`<text x="${cx}" y="${cy+28}" text-anchor="middle" fill="#4caf50" font-size="7.5" font-family="Barlow Condensed" font-weight="700">✓ IDEAL</text>`);
    // Arrow from their placement to ideal
    if(svgX!==null){
      const dx=cx-svgX,dy=cy-svgY,l=Math.sqrt(dx*dx+dy*dy);
      if(l>12){
        const ux=dx/l,uy=dy/l;
        const ax1=svgX+ux*22,ay1=svgY+uy*22;
        const ax2=cx-ux*22,ay2=cy-uy*22;
        const hx=ax2-ux*10,hy=ay2-uy*10;
        els.push(`<line x1="${ax1}" y1="${ay1}" x2="${hx}" y2="${hy}" stroke="#4caf50" stroke-width="1.8" stroke-dasharray="5,3" opacity=".85"/>`);
        els.push(`<polygon points="${ax2},${ay2} ${hx-uy*4},${hy+ux*4} ${hx+uy*4},${hy-ux*4}" fill="#4caf50" opacity=".85"/>`);
      }
    }
  }
  return els.join('');
}

function ballPlacementOverlay(startSVG,placedSVG,targetSVG,ok){
  const els=[];
  const {x:sx,y:sy}=startSVG;
  const {svgX:px,svgY:py}=placedSVG;
  const {cx,cy}=targetSVG;
  if(ok){
    // Green glow at their placed ball position
    els.push(`<circle cx="${px}" cy="${py}" r="16" fill="#4caf50" opacity=".15"/>`);
    els.push(`<circle cx="${px}" cy="${py}" r="14" fill="none" stroke="#4caf50" stroke-width="2.2" opacity=".9"/>`);
    els.push(`<text x="${px}" y="${py+1}" text-anchor="middle" dominant-baseline="middle" fill="#4caf50" font-size="14">✓</text>`);
  } else {
    // Their ball arrow (red dashed)
    const dx1=px-sx,dy1=py-sy,l1=Math.sqrt(dx1*dx1+dy1*dy1);
    if(l1>8){
      const ux1=dx1/l1,uy1=dy1/l1,hx1=px-ux1*12,hy1=py-uy1*12;
      els.push(`<line x1="${sx}" y1="${sy}" x2="${hx1}" y2="${hy1}" stroke="#e4002b" stroke-width="2" stroke-dasharray="6,4" opacity=".7"/>`);
      els.push(`<polygon points="${px},${py} ${hx1-uy1*4},${hy1+ux1*4} ${hx1+uy1*4},${hy1-ux1*4}" fill="#e4002b" opacity=".7"/>`);
    }
    // Red X at their placed position
    els.push(`<circle cx="${px}" cy="${py}" r="14" fill="#e4002b" opacity=".12"/>`);
    els.push(`<circle cx="${px}" cy="${py}" r="13" fill="none" stroke="#e4002b" stroke-width="2" stroke-dasharray="4,3" opacity=".8"/>`);
    els.push(`<text x="${px}" y="${py+1}" text-anchor="middle" dominant-baseline="middle" fill="#e4002b" font-size="13">✗</text>`);
    // Ideal ball arrow (green solid)
    const dx2=cx-sx,dy2=cy-sy,l2=Math.sqrt(dx2*dx2+dy2*dy2);
    if(l2>8){
      const ux2=dx2/l2,uy2=dy2/l2,hx2=cx-ux2*12,hy2=cy-uy2*12;
      els.push(`<line x1="${sx}" y1="${sy}" x2="${hx2}" y2="${hy2}" stroke="#4caf50" stroke-width="2" stroke-dasharray="6,4" opacity=".9"/>`);
      els.push(`<polygon points="${cx},${cy} ${hx2-uy2*4},${hy2+ux2*4} ${hx2+uy2*4},${hy2-ux2*4}" fill="#4caf50" opacity=".9"/>`);
    }
    // Green ideal ball position
    els.push(`<circle cx="${cx}" cy="${cy}" r="14" fill="#4caf50" opacity=".15"/>`);
    els.push(`<circle cx="${cx}" cy="${cy}" r="13" fill="none" stroke="#4caf50" stroke-width="2.2" opacity=".9"/>`);
    els.push(ballSVGEl(cx,cy));
    els.push(`<text x="${cx}" y="${cy+22}" text-anchor="middle" fill="#4caf50" font-size="7.5" font-family="Barlow Condensed" font-weight="700">✓ IDEAL</text>`);
  }
  return els.join('');
}

function shuffleArr(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

let tokenState={};

function initTokenState(q){
  tokenState={};
  q.leons.forEach(l=>{tokenState[l.id]={placed:false,pxX:0,pxY:0,svgX:0,svgY:0};});
  tokenState['ball']={placed:false,pxX:0,pxY:0,svgX:0,svgY:0};
}

// ── COURT DIMENSIONS (robust) ─────────────────────────────────
function getCourtDims(){
  const wrap=document.getElementById('court-wrap');
  const svg=document.getElementById('court-svg');
  // Try multiple sources for width
  let w=0;
  if(svg) w=svg.offsetWidth||svg.getBoundingClientRect().width||0;
  if(!w&&wrap) w=wrap.offsetWidth||wrap.getBoundingClientRect().width||0;
  if(!w) w=Math.min(window.innerWidth-28,400);
  return {w,h:Math.round(w*360/260)};
}
function pxToSVG(px,py){const {w,h}=getCourtDims();return {svgX:px/w*260,svgY:py/h*360};}
function svgToPx(sx,sy){const {w,h}=getCourtDims();return {pxX:sx/260*w,pxY:sy/360*h};}
function isOnCourt(px,py){
  const {w,h}=getCourtDims();
  // Court area: x 15-w-15, y 15-h-15
  return px>15&&px<w-15&&py>15&&py<h-15;
}

function setTokPos(id,px,py){
  const t=document.getElementById('tok-'+id);
  if(t){t.style.left=px+'px';t.style.top=py+'px';}
}
function updateTokStyle(id){
  const t=document.getElementById('tok-'+id);
  if(!t) return;
  t.classList.toggle('on-court',tokenState[id]?.placed||false);
}

// ── LIVE ARROW OVERLAY ────────────────────────────────────────
function updateArrowOverlay(q){
  const ov=document.getElementById('arrow-overlay');
  if(!ov) return;
  const st=tokenState['ball'];
  if(!st?.placed){ov.innerHTML='';return;}
  const {w,h}=getCourtDims();
  const bx=q.ballToken.startSVG.x/260*w;
  const by=q.ballToken.startSVG.y/360*h;
  const tx=st.pxX,ty=st.pxY;
  const dx=tx-bx,dy=ty-by,len=Math.sqrt(dx*dx+dy*dy);
  if(len<8){ov.innerHTML='';return;}
  const ux=dx/len,uy=dy/len,hx=tx-ux*13,hy=ty-uy*13;
  ov.setAttribute('viewBox',`0 0 ${w} ${h}`);
  ov.innerHTML=`
    <line x1="${bx}" y1="${by}" x2="${hx}" y2="${hy}" stroke="${GOLD}" stroke-width="2.5" stroke-dasharray="8,4" opacity=".95"/>
    <polygon points="${tx},${ty} ${hx-uy*5.5},${hy+ux*5.5} ${hx+uy*5.5},${hy-ux*5.5}" fill="${GOLD}" opacity=".95"/>`;
}

function updatePips(q){
  const ids=[...q.leons.map(l=>l.id),'ball'];
  ids.forEach(id=>{
    const p=document.getElementById('pip-'+id);
    if(p) p.classList.toggle('placed',tokenState[id]?.placed||false);
  });
  const all=ids.every(id=>tokenState[id]?.placed);
  const btn=document.getElementById('confirm-btn');
  if(btn) btn.classList.toggle('ready',all);
}

// ── POINTER EVENTS ─────────────────────────────────────────────
function onPD(e){
  if(activeDrag) return;
  e.preventDefault();
  const id=e.currentTarget.dataset.id;
  e.currentTarget.setPointerCapture(e.pointerId);
  activeDrag={id,pid:e.pointerId};
}
function onPM(e){
  if(!activeDrag||activeDrag.id!==e.currentTarget.dataset.id) return;
  e.preventDefault();
  const wrap=document.getElementById('court-wrap');
  if(!wrap) return;
  const rect=wrap.getBoundingClientRect();
  const px=e.clientX-rect.left,py=e.clientY-rect.top;
  if(!tokenState[activeDrag.id]) return;
  tokenState[activeDrag.id].pxX=px;
  tokenState[activeDrag.id].pxY=py;
  setTokPos(activeDrag.id,px,py);
  if(activeDrag.id==='ball') updateArrowOverlay(shuffled[qIndex]);
}
function onPU(e){
  if(!activeDrag||activeDrag.id!==e.currentTarget.dataset.id) return;
  const id=activeDrag.id;
  activeDrag=null;
  const q=shuffled[qIndex];
  const st=tokenState[id];
  if(!st) return;
  if(isOnCourt(st.pxX,st.pxY)){
    const {svgX,svgY}=pxToSVG(st.pxX,st.pxY);
    st.placed=true;st.svgX=svgX;st.svgY=svgY;
  } else {
    snapToStaging(id,q);
  }
  updateTokStyle(id);
  updatePips(q);
}
function onLC(e){if(activeDrag?.id===e.currentTarget.dataset.id)activeDrag=null;}
function attachEvents(tok){
  tok.addEventListener('pointerdown',onPD,{passive:false});
  tok.addEventListener('pointermove',onPM,{passive:false});
  tok.addEventListener('pointerup',onPU);
  tok.addEventListener('lostpointercapture',onLC);
}

function snapToStaging(id,q){
  const wrap=document.getElementById('court-wrap');
  if(!wrap) return;
  const svgW=wrap.offsetWidth||300;
  const svgH=Math.round(svgW*360/260);
  const ids=[...q.leons.map(l=>l.id),'ball'];
  const idx=ids.indexOf(id);
  const step=svgW/(ids.length+1);
  const px=step*(idx+1),py=svgH+52;
  const st=tokenState[id];
  if(st){st.placed=false;st.pxX=px;st.pxY=py;st.svgX=0;st.svgY=0;}
  setTokPos(id,px,py);
  if(id==='ball') updateArrowOverlay(q);
}

// ── CONFIRM ───────────────────────────────────────────────────
function confirmPlacement(){
  const q=shuffled[qIndex];
  const ids=[...q.leons.map(l=>l.id),'ball'];
  if(!ids.every(id=>tokenState[id]?.placed)) return;

  // Freeze all and fade out tokens so SVG overlays are clearly visible
  ids.forEach(id=>{
    const tok=document.getElementById('tok-'+id);
    if(tok){
      tok.classList.add('frozen');
      tok.style.opacity='0.22';
      tok.style.pointerEvents='none';
    }
    const {svgX,svgY}=pxToSVG(tokenState[id].pxX,tokenState[id].pxY);
    tokenState[id].svgX=svgX;tokenState[id].svgY=svgY;
  });

  // Grade players — 2pts each
  let placementPts=0;
  const results={};
  q.leons.forEach(l=>{
    const st=tokenState[l.id];
    const dist=Math.sqrt((st.svgX-l.cx)**2+(st.svgY-l.cy)**2);
    const ok=dist<=l.tol;
    if(ok) placementPts+=2;
    results[l.id]={ok,svgX:st.svgX,svgY:st.svgY};
  });

  // Grade ball — 2pts
  const bst=tokenState['ball'];
  const bdist=Math.sqrt((bst.svgX-q.ballToken.target.cx)**2+(bst.svgY-q.ballToken.target.cy)**2);
  const bok=bdist<=q.ballToken.target.tol;
  if(bok) placementPts+=2;

  // Store placement pts for this question so MCQ can add to it
  shuffled[qIndex]._placementPts=placementPts;

  // Add placement points to score now
  score+=placementPts;
  document.getElementById('score-display').textContent=score;

  // Rebuild SVG with overlays
  const overlays=q.leons.map(l=>placementOverlay(l,results[l.id].svgX,results[l.id].svgY,results[l.id].ok));
  overlays.push(ballPlacementOverlay(
    q.ballToken.startSVG,
    {svgX:bst.svgX,svgY:bst.svgY},
    {cx:q.ballToken.target.cx,cy:q.ballToken.target.cy},
    bok
  ));
  const wrap=document.getElementById('court-wrap');
  document.getElementById('court-svg')?.remove();
  wrap.insertAdjacentHTML('afterbegin',buildCourtSVG(q,overlays));
  updateArrowOverlay(q);

  // Banner — show pts earned
  const correctCount=q.leons.filter(l=>results[l.id].ok).length+(bok?1:0);
  const total=q.leons.length+1;
  let hints=q.leons.map(l=>`<div class="hint-row"><span class="hint-icon">${results[l.id].ok?'✅':'❌'}</span><span><strong>${l.lbl}:</strong> ${l.hint}</span></div>`).join('');
  hints+=`<div class="hint-row"><span class="hint-icon">${bok?'✅':'❌'}</span><span><strong>🏐 BALL:</strong> ${q.ballToken.target.hint}</span></div>`;
  const bc=correctCount===total?'all-correct':correctCount===0?'all-wrong':'partial';
  const bt=correctCount===total
    ?`✓ Perfect positioning! +${placementPts} pts`
    :`Positioning: ${placementPts}/6 pts — review hints below.`;
  const banner=document.getElementById('placement-banner');
  banner.className='placement-banner '+bc+' show';
  banner.innerHTML=`<div class="pb-title">${bt}</div>${hints}${correctCount<total?buildReferenceLegend():''}`;

  document.getElementById('confirm-btn').style.display='none';
  document.getElementById('place-status').style.display='none';
  document.getElementById('mcq-section').style.display='block';
}

// ── MCQ ───────────────────────────────────────────────────────
function pickAnswer(idx){
  if(answered) return;
  answered=true;
  const q=shuffled[qIndex];
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===q.correct){btn.classList.add('correct');btn.querySelector('.choice-icon').textContent='✓';}
    else if(i===idx){btn.classList.add('wrong');btn.querySelector('.choice-icon').textContent='✗';}
    else btn.classList.add('dimmed');
  });
  const correct=idx===q.correct;
  if(correct){
    score+=4;
    document.getElementById('score-display').textContent=score;
  }
  const cat=q.cat;
  if(!catScores[cat]) catScores[cat]={pts:0,total:0};
  catScores[cat].total+=10;
  catScores[cat].pts+=(q._placementPts||0)+(correct?4:0);
  document.getElementById('explanation').classList.add('show');
  // Show pts earned on question
  const ptNote=document.createElement('div');
  ptNote.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:13px;color:var(--gold);letter-spacing:1px;margin-bottom:10px;';
  ptNote.textContent=correct?'+4 pts — correct answer ✓':'+0 pts — incorrect answer';
  document.getElementById('explanation').insertAdjacentElement('beforebegin',ptNote);
  document.getElementById('next-btn').classList.add('show');
}

// ── LEGEND ────────────────────────────────────────────────────
function buildLegend(){
  // Basic key only — shown during the question. No zones, no signals.
  const readySVG=`<svg class="lsvg" width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="${OPP}" stroke="#fff" stroke-width="1.8"/><text x="11" y="14" text-anchor="middle" fill="#fff" font-size="8" font-family="Barlow Condensed" font-weight="700">OPP</text></svg>`;
  const downSVG=`<svg class="lsvg" width="36" height="22" viewBox="0 0 36 22"><ellipse cx="18" cy="11" rx="17" ry="9" fill="${OPP}" stroke="#fff" stroke-width="1.8" opacity=".85"/><text x="18" y="15" text-anchor="middle" fill="#fff" font-size="7" font-family="Barlow Condensed" font-weight="700">▼DOWN</text></svg>`;
  const yourSVG=`<svg class="lsvg" width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="${YOUR}" stroke="#fff" stroke-width="1.8"/></svg>`;
  const ballSVG=`<svg class="lsvg" width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="9" fill="#fffde7" stroke="#c8a820" stroke-width="1.8"/><ellipse cx="11" cy="11" rx="5" ry="9" fill="none" stroke="#c8a820" stroke-width=".8" opacity=".5"/></svg>`;
  return `<div class="legend-panel">
    <div class="legend-title">🔑 KEY</div>
    <div class="legend-row">${yourSVG}<span>Your players — drag onto the court</span></div>
    <div class="legend-row">${readySVG}<span>Opponent — standing, ready to defend</span></div>
    <div class="legend-row">${downSVG}<span>Opponent — down / still recovering from a dive</span></div>
    <div class="legend-row">${ballSVG}<span>Ball — drag to where you want to send it</span></div>
    <div class="legend-row">
      <svg class="lsvg" width="36" height="22" viewBox="0 0 36 22">
        <line x1="4" y1="11" x2="26" y2="11" stroke="${GOLD}" stroke-width="2.5" stroke-dasharray="6,3"/>
        <polygon points="32,11 24,7 24,15" fill="${GOLD}"/>
      </svg>
      <span>Gold arrow — shows where you are directing the ball</span>
    </div>
  </div>`;
}

function buildReferenceLegend(){
  // Full reference — zones + blocking signals — shown only after incorrect placement
  return `<div class="legend-panel" style="border-color:#333;margin-top:12px;">
    <div class="legend-title">📍 SET ZONES</div>
    <div class="zone-grid">
      <div class="zone-item"><span class="zone-num">1/10</span><span>Left antenna</span></div>
      <div class="zone-item"><span class="zone-num">2/20</span><span>Left center</span></div>
      <div class="zone-item"><span class="zone-num">3/30</span><span>Middle net</span></div>
      <div class="zone-item"><span class="zone-num">4/40</span><span>Right center</span></div>
      <div class="zone-item"><span class="zone-num">5/50</span><span>Right antenna</span></div>
    </div>
    <div style="margin-top:4px;font-size:10px;color:#555;">1–5 = high set &nbsp;·&nbsp; 10–50 = quick/low set</div>
    <div class="divider"></div>
    <div class="legend-title">🤙 BLOCKING SIGNALS</div>
    <div class="legend-row"><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);min-width:32px;">1</span><span>Block LINE — defender plays the angle. If set is off the net and blocker pulls, she digs line.</span></div>
    <div class="legend-row"><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);min-width:32px;">2</span><span>Block ANGLE — defender slides to dig line. If blocker pulls on a bad set, she pulls toward the angle.</span></div>
    <div class="legend-row"><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);min-width:32px;">✊</span><span>Closed fist — read block. Blocker reads and goes for the block; defender reads and digs what she sees. Offensive move going for the point.</span></div>
    <div class="legend-row"><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);min-width:32px;">3</span><span>Bait LINE — blocker shows line open early, then dive-blocks line at the last second.</span></div>
    <div class="legend-row"><span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);min-width:32px;">4</span><span>Bait ANGLE — blocker shows angle open early, then dive-blocks the angle at the last second.</span></div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────
function renderQuestion(){
  const q=shuffled[qIndex];
  answered=false;
  initTokenState(q);
  document.getElementById('prog-bar').style.width=(qIndex/shuffled.length*100)+'%';
  document.getElementById('score-display').textContent=score;

  const ltrs=['A','B','C','D'];
  const choicesHTML=q.choices.map((c,i)=>`
    <button class="choice-btn" onclick="pickAnswer(${i})">
      <span class="choice-ltr">${ltrs[i]}</span><span>${c}</span><span class="choice-icon"></span>
    </button>`).join('');

  const allIds=[...q.leons.map(l=>({id:l.id,lbl:l.lbl})),{id:'ball',lbl:'🏐 BALL'}];
  const pipHTML=allIds.map(x=>`<div class="place-pip" id="pip-${x.id}">${x.lbl}</div>`).join('');

  document.getElementById('app').innerHTML=`
    <div class="q-wrap">
      <div class="q-meta"><span class="q-cat">${q.cat}</span><span class="q-num">Q${qIndex+1} of ${shuffled.length}</span></div>
      <p class="scenario-text">${q.scenario}</p>
      <div class="instruct-box"><strong>Step 1 — Positioning (6 pts):</strong> ${q.instruct}</div>
      <div id="court-wrap">
        ${buildCourtSVG(q)}
        <svg id="arrow-overlay" style="position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:11;overflow:visible;"></svg>
      </div>
      <div style="text-align:center;padding:7px 0 3px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--red);text-transform:uppercase;font-weight:700;">
        ↑ DRAG YOUR PLAYERS + 🏐 BALL ONTO THE COURT ↑
      </div>
      ${buildLegend()}
      <div id="place-status" class="place-status">${pipHTML}</div>
      <button id="confirm-btn" class="confirm-btn" onclick="confirmPlacement()">CONFIRM POSITIONS</button>
      <div id="placement-banner" class="placement-banner"></div>
      <div id="mcq-section" style="display:none">
        <div class="instruct-box"><strong>Step 2 — Answer the Question (4 pts):</strong></div>
        <p class="question-text">❓ ${q.q}</p>
        <div class="choices">${choicesHTML}</div>
        <div class="explanation" id="explanation">${q.expl}</div>
        <button class="next-btn" id="next-btn" onclick="nextQ()">
          ${qIndex<shuffled.length-1?'NEXT SCENARIO →':'SEE MY RESULTS →'}
        </button>
      </div>
    </div>`;

  // Use double RAF to ensure DOM has painted before measuring
  requestAnimationFrame(()=>requestAnimationFrame(()=>sizeWrap(q)));
}

function sizeWrap(q){
  const wrap=document.getElementById('court-wrap');
  if(!wrap) return;
  const svgW=wrap.offsetWidth||wrap.getBoundingClientRect().width||Math.min(window.innerWidth-28,400);
  const svgH=Math.round(svgW*360/260);
  wrap.style.height=(svgH+105)+'px';

  // Ensure arrow-overlay height matches
  const ov=document.getElementById('arrow-overlay');
  if(ov) ov.style.height=svgH+'px';

  // Create tokens in staging row below SVG
  const allToks=[
    ...q.leons.map((l,i)=>({id:l.id,lbl:l.lbl,sub:l.sub,isBall:false,i})),
    {id:'ball',lbl:'🏐',sub:'',isBall:true,i:q.leons.length},
  ];
  const total=allToks.length;
  allToks.forEach(t=>{
    const step=svgW/(total+1);
    const px=step*(t.i+1),py=svgH+54;
    const st=tokenState[t.id];
    if(st){st.pxX=px;st.pxY=py;}

    const tok=document.createElement('div');
    tok.className='token '+(t.isBall?'ball-tok':'player-tok');
    tok.id='tok-'+t.id;
    tok.dataset.id=t.id;
    if(!t.isBall) tok.style.background=YOUR;
    tok.style.left=px+'px';
    tok.style.top=py+'px';
    tok.innerHTML=`<span class="tok-lbl">${t.lbl}</span><span class="tok-sub">${t.sub}</span>`;
    attachEvents(tok);
    wrap.appendChild(tok);
  });
}

function nextQ(){
  qIndex++;
  if(qIndex>=shuffled.length) showResult();
  else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}
}

function showResult(){
  document.getElementById('prog-bar').style.width='100%';
  const maxScore=shuffled.length*10;
  const pct=score/maxScore;
  const tiers=[
    {min:.9,grade:'A+',label:'ELITE COURT IQ',sub:'You see the game a step ahead.'},
    {min:.7,grade:'B', label:'SHARP PLAYER', sub:'Solid reads with a few gaps to close.'},
    {min:.5,grade:'C', label:'DEVELOPING',   sub:'The instincts are there — now build the habits.'},
    {min:0, grade:'D', label:'KEEP GRINDING',sub:'Court sense is trainable. Review the explanations and go again.'},
  ];
  const t=tiers.find(x=>pct>=x.min);
  const catHTML=Object.entries(catScores).map(([cat,s])=>{
    const p=s.total>0?s.pts/s.total:0;
    const bc=p>=.7?'#4caf50':p>=.4?'#d4a843':'#e4002b';
    return `<div class="cat-row"><span class="cat-name">${cat}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.round(p*100)}%;background:${bc}"></div></div><span class="cat-score">${s.pts}/${s.total}</span></div>`;
  }).join('');
  document.getElementById('app').innerHTML=`
    <div class="result-screen show">
      <div class="result-grade">${t.grade}</div>
      <div class="result-label">${t.label}</div>
      <div class="result-sub">${score} / ${maxScore} pts — ${t.sub}</div>
      <div class="result-breakdown"><h3>📊 By Category</h3>${catHTML}</div>
      <button class="retry-btn" onclick="restart()">RETAKE LEVEL 1</button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
  // Notify parent app with score if embedded in player portal
  const urlParams=new URLSearchParams(window.location.search);
  const playerId=urlParams.get('player');
  if(playerId && window.parent !== window){
    window.parent.postMessage({
      type:'courtsenseScore',
      playerId:playerId,
      score:score,
      maxScore:shuffled.length*10,
      date:new Date().toISOString().split('T')[0]
    },'*');
  }
}

function restart(){
  qIndex=0;score=0;
  Object.keys(catScores).forEach(k=>delete catScores[k]);
  shuffled=shuffleArr(QUESTIONS);
  renderQuestion();
}

window.addEventListener('resize',()=>{
  const q=shuffled[qIndex];
  if(!q) return;
  const wrap=document.getElementById('court-wrap');
  if(!wrap) return;
  const svgW=wrap.offsetWidth||300;
  const svgH=Math.round(svgW*360/260);
  wrap.style.height=(svgH+105)+'px';
  const ov=document.getElementById('arrow-overlay');
  if(ov) ov.style.height=svgH+'px';
  const ids=[...q.leons.map((l,i)=>({id:l.id,i})),{id:'ball',i:q.leons.length}];
  const total=ids.length;
  ids.forEach(({id,i})=>{
    const st=tokenState[id];
    if(!st) return;
    if(st.placed&&st.svgX){
      const {pxX,pxY}=svgToPx(st.svgX,st.svgY);
      st.pxX=pxX;st.pxY=pxY;setTokPos(id,pxX,pxY);
    } else {
      const step=svgW/(total+1),px=step*(i+1),py=svgH+54;
      st.pxX=px;st.pxY=py;setTokPos(id,px,py);
    }
  });
  updateArrowOverlay(q);
});

renderQuestion();
</script>
