<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon Queens — Beach Volleyball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#e4002b;--red-dark:#b0001f;--gold:#d4a843;--gold-light:#f5d78e;
  --cream:#f7f4f0;--white:#ffffff;--black:#0a0a0a;
  --charcoal:#1a1a2e;--navy:#0f0f23;
  --gray:#888;--gray-light:#bbb;--gray-lighter:#e5e5e5;
  --green:#16a34a;--green-bg:#dcfce7;
  --loss-red:#dc2626;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Barlow',sans-serif;
  background:var(--cream);
  color:var(--black);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HERO HEADER ── */
.hero{
  background:var(--charcoal);
  position:relative;
  overflow:hidden;
  padding:0;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(228,0,43,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 30%, rgba(212,168,67,0.15) 0%, transparent 60%),
    linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f1f 100%);
}
.hero-pattern{
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 40px);
}
.hero-content{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 16px;
  gap:12px;
}
.hero-left{display:flex;align-items:center;gap:14px;}
.crown-icon{font-size:36px;filter:drop-shadow(0 0 12px rgba(212,168,67,0.6));}
.hero-text{}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;letter-spacing:2px;
  color:var(--white);line-height:1;
}
.hero-sub{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;letter-spacing:3px;font-weight:700;
  color:var(--gold);text-transform:uppercase;margin-top:2px;
}
.hero-right{text-align:right;}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(228,0,43,0.2);border:1px solid rgba(228,0,43,0.4);
  padding:6px 12px;border-radius:20px;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;
  color:#ff6b6b;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.sync-status{font-size:11px;color:var(--gray);margin-top:4px;font-family:'Barlow',sans-serif;}

/* ── SEASON RECORD STRIP ── */
.record-strip{
  background:var(--red);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;
}
.record-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:3px;
  color:var(--white);
}
.record-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:2px;font-weight:700;
  color:rgba(255,255,255,0.65);text-transform:uppercase;
}
.record-stats{display:flex;gap:20px;}
.record-stat{text-align:center;}
.record-stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);}
.record-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;color:rgba(255,255,255,0.6);font-weight:700;}

/* ── SECTIONS ── */
.section{padding:16px 16px 0;}
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:2px;
  color:var(--charcoal);
  display:flex;align-items:center;gap:8px;
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:2px solid var(--red);
}
.section-title span{color:var(--red);}

/* ── TODAY CARD ── */
.today-card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  margin-bottom:12px;
}
.today-header{
  background:linear-gradient(135deg, var(--charcoal) 0%, #2d2d4e 100%);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.today-matchup{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:2px;color:var(--white);
}
.today-date{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;letter-spacing:1.5px;font-weight:700;
  color:var(--gold);margin-top:2px;
}
.dual-result{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;letter-spacing:2px;
  color:var(--white);
  text-align:right;
}
.dual-result-lbl{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.5);font-family:'Barlow Condensed',sans-serif;font-weight:700;}

/* ── COURT ROWS ── */
.court-list{padding:8px 0;}
.court-row{
  padding:10px 16px;
  border-bottom:1px solid var(--gray-lighter);
  display:flex;align-items:center;gap:10px;
}
.court-row:last-child{border-bottom:none;}
.ct-badge{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;
  padding:3px 8px;border-radius:4px;min-width:38px;text-align:center;flex-shrink:0;
}
.ct-1{background:#fde2e8;color:var(--red-dark);}
.ct-2{background:#e0e7ff;color:#3730a3;}
.ct-3{background:#fef3c7;color:#92400e;}
.ct-4{background:#d1fae5;color:#065f46;}
.ct-5{background:#f3e8ff;color:#6b21a8;}
.ct-6{background:#fce7f3;color:#9d174d;}
.ct-7{background:#ecfdf5;color:#065f46;}
.ct-8{background:#fffbeb;color:#92400e;}
.court-pair{
  flex:1;
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;
  color:var(--charcoal);
}
.court-opp{font-size:12px;color:var(--gray);font-weight:400;}
.court-score{
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;letter-spacing:1px;
  text-align:right;
  flex-shrink:0;
}
.score-win{color:var(--green);}
.score-loss{color:var(--loss-red);}
.score-pending{color:var(--gray-light);font-size:13px;}
.set-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.set-chip{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:3px;
}
.set-chip.w{background:var(--green-bg);color:var(--green);}
.set-chip.l{background:#fee2e2;color:var(--loss-red);}
.set-chip.pending{background:var(--gray-lighter);color:var(--gray);}

/* ── NO GAME TODAY ── */
.no-game{
  background:var(--white);border-radius:var(--radius);
  padding:28px 20px;text-align:center;
  box-shadow:var(--shadow);margin-bottom:12px;
}
.no-game-icon{font-size:36px;margin-bottom:8px;}
.no-game-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:var(--charcoal);}
.no-game-sub{font-size:13px;color:var(--gray);margin-top:4px;}

/* ── UPCOMING DUALS ── */
.dual-card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:14px 16px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:12px;
}
.dual-date-block{
  background:var(--charcoal);
  border-radius:8px;
  padding:8px 12px;
  text-align:center;
  flex-shrink:0;min-width:52px;
}
.dual-month{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;font-weight:700;color:var(--gold);text-transform:uppercase;}
.dual-day{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);line-height:1;}
.dual-info{flex:1;}
.dual-opp{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--charcoal);}
.dual-meta{font-size:12px;color:var(--gray);margin-top:2px;}
.dual-type-badge{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;font-weight:700;
  padding:3px 8px;border-radius:4px;
}
.type-gameday{background:#dbeafe;color:#1d4ed8;}
.type-scrimmage{background:#f3e8ff;color:#6b21a8;}

/* ── FOOTER ── */
.footer{
  padding:20px 16px 32px;
  text-align:center;
}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gray);}
.footer-sub{font-size:11px;color:var(--gray-light);margin-top:4px;}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:14px;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;
  color:var(--gray);text-decoration:none;
  padding:8px 16px;border:1px solid var(--gray-lighter);border-radius:8px;
  transition:all 0.2s;
}
.back-btn:hover{color:var(--red);border-color:var(--red);}

/* ── LOADING ── */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;gap:12px;
}
.spinner{width:32px;height:32px;border:3px solid var(--gray-lighter);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;font-weight:700;color:var(--gray);}

/* ── EMPTY STATE ── */
.empty{padding:20px;text-align:center;color:var(--gray);font-size:13px;}

/* ── RESPONSIVE ── */
@media(max-width:400px){
  .hero-title{font-size:26px;}
  .record-main{font-size:22px;}
  .dual-result{font-size:28px;}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-pattern"></div>
  <div class="hero-content">
    <div class="hero-left">
      <div class="crown-icon">👑</div>
      <div class="hero-text">
        <div class="hero-title">Leon Queens</div>
        <div class="hero-sub">Beach Volleyball · 2026</div>
      </div>
    </div>
    <div class="hero-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="sync-status" id="sync-status">Connecting...</div>
    </div>
  </div>
</div>

<!-- SEASON RECORD STRIP -->
<div class="record-strip" id="record-strip">
  <div>
    <div class="record-label">Season Record</div>
    <div class="record-main" id="record-main">— — —</div>
  </div>
  <div class="record-stats" id="record-stats"></div>
</div>

<!-- TODAY SECTION -->
<div class="section">
  <div class="section-title"><span>🏐</span> Today's Match</div>
  <div id="today-container"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading...</div></div></div>
</div>

<!-- UPCOMING DUALS SECTION -->
<div class="section" style="padding-top:16px;">
  <div class="section-title"><span>📅</span> Upcoming Duals</div>
  <div id="upcoming-container"><div class="loading"><div class="spinner"></div><div class="loading-text">Loading...</div></div></div>
</div>

<div class="footer">
  <div class="footer-logo">👑 Leon Queens</div>
  <div class="footer-sub">Leon High School · Tallahassee, FL</div>
  <a href="index.html" class="back-btn">← Back to Login</a>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
const FB_CONFIG={apiKey:"AIzaSyC8Ue06XPvGXo1XTloewPvDRBWtK5tDAj8",authDomain:"leon-beach-volleyball.firebaseapp.com",databaseURL:"https://leon-beach-volleyball-default-rtdb.firebaseio.com",projectId:"leon-beach-volleyball",storageBucket:"leon-beach-volleyball.firebasestorage.app",messagingSenderId:"937804799976",appId:"1:937804799976:web:02121e68655b4febeb8e5d"};
const DB_ROOT='leon_queens_matches';

firebase.initializeApp(FB_CONFIG);
const db=firebase.database();

// State
let D={players:[],gamedays:[],scrimmages:[],assignments:{},schedule:[]};

function td(){return new Date().toISOString().slice(0,10);}

function fmtDate(d){
  if(!d)return'';
  const[y,m,day]=d.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1]+' '+parseInt(day);
}

function pN(id){
  const p=D.players.find(x=>x.id===id);
  if(!p)return'?';
  const dups=D.players.filter(x=>x.firstName===p.firstName);
  return dups.length>1?p.firstName+' '+p.lastName.charAt(0)+'.':p.firstName;
}

// Firebase connection
db.ref('.info/connected').on('value',s=>{
  document.getElementById('sync-status').textContent=s.val()?'Live updates on':'Offline';
});

// Main data listener
db.ref(DB_ROOT).on('value',snap=>{
  const val=snap.val()||{};
  D.players=val.players?Object.values(val.players):[];
  D.gamedays=val.gamedays?Object.values(val.gamedays):[];
  D.scrimmages=val.scrimmages?Object.values(val.scrimmages):[];
  D.assignments=val.assignments||{};
  D.schedule=val.schedule?Object.values(val.schedule):[];
  render();
});

function render(){
  renderRecord();
  renderToday();
  renderUpcoming();
}

// ── SEASON RECORD ──
function renderRecord(){
  let setW=0,setL=0,matchW=0,matchL=0,dualW=0,dualL=0;

  // Count sets and matches from gamedays
  // A match = pair that won best of 3 sets (2 sets wins the match)
  const matchesByPairDate={};
  D.gamedays.forEach(m=>{
    const sets=m.sets||[];
    const sw=sets.filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
    const sl=sets.filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
    sets.forEach(s=>{ if((s.scoreUs||0)>(s.scoreThem||0))setW++;else setL++; });
    if(sw>=2)matchW++;
    else if(sl>=2)matchL++;
  });

  // Dual record: per date, did Leon win more matches than lost?
  const dualDates=new Set(D.gamedays.map(m=>m.date));
  dualDates.forEach(date=>{
    const dayMatches=D.gamedays.filter(m=>m.date===date);
    let dw=0,dl=0;
    dayMatches.forEach(m=>{
      const sets=m.sets||[];
      const sw=sets.filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
      const sl=sets.filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
      if(sw>=2)dw++;
      else if(sl>=2)dl++;
    });
    if(dw>dl)dualW++;else if(dl>dw)dualL++;
  });

  document.getElementById('record-main').textContent=`${matchW} — ${matchL}`;
  document.getElementById('record-stats').innerHTML=`
    <div class="record-stat"><div class="record-stat-num">${matchW}</div><div class="record-stat-lbl">Match Wins</div></div>
    <div class="record-stat"><div class="record-stat-num">${matchL}</div><div class="record-stat-lbl">Match Losses</div></div>
    <div class="record-stat"><div class="record-stat-num">${dualW}-${dualL}</div><div class="record-stat-lbl">Duals</div></div>
  `;
}

// ── TODAY'S MATCH ──
function renderToday(){
  const today=td();
  const container=document.getElementById('today-container');

  const assignment=Object.values(D.assignments).find(a=>a.date===today&&(a.type==='gameday'||a.type==='scrimmage'));

  if(!assignment){
    const sched=D.schedule.find(s=>s.date===today);
    if(sched){
      container.innerHTML=`<div class="no-game">
        <div class="no-game-icon">🏐</div>
        <div class="no-game-title">Match Day vs ${sched.opponent||'TBD'}</div>
        <div class="no-game-sub">Lineup coming soon — check back closer to match time</div>
      </div>`;
    }else{
      container.innerHTML=`<div class="no-game">
        <div class="no-game-icon">🏖️</div>
        <div class="no-game-title">No Match Today</div>
        <div class="no-game-sub">Check Upcoming Duals below for the next match</div>
      </div>`;
    }
    return;
  }

  const opp=assignment.opponent||'Opponent';
  const courts=assignment.courts||[];
  const matchList=assignment.type==='scrimmage'?D.scrimmages:D.gamedays;

  // Count dual score: matches won (2+ sets)
  let leonMatches=0,oppMatches=0,inProgress=0;
  courts.forEach(c=>{
    const match=matchList.find(m=>m.date===today&&m.pair&&m.pair[0]===c.p1&&m.pair[1]===c.p2);
    if(match&&match.sets&&match.sets.length){
      const sw=match.sets.filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
      const sl=match.sets.filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
      if(sw>=2)leonMatches++;
      else if(sl>=2)oppMatches++;
      else inProgress++;
    }
  });

  const hasAnyScores=courts.some(c=>{
    const m=matchList.find(x=>x.date===today&&x.pair&&x.pair[0]===c.p1&&x.pair[1]===c.p2);
    return m&&(m.sets||[]).length>0;
  });

  let courtsHTML='';
  courts.forEach(c=>{
    const p1=pN(c.p1),p2=pN(c.p2);
    const match=matchList.find(m=>m.date===today&&m.pair&&m.pair[0]===c.p1&&m.pair[1]===c.p2);
    const sets=match?match.sets||[]:[];
    const sw=sets.filter(s=>(s.scoreUs||0)>(s.scoreThem||0)).length;
    const sl=sets.filter(s=>(s.scoreThem||0)>(s.scoreUs||0)).length;
    const matchWon=sw>=2,matchLost=sl>=2;

    let scoreHTML='';
    if(sets.length){
      // Show all recorded sets — includes in-progress
      const setChips=sets.map((s,i)=>{
        const w=(s.scoreUs||0)>(s.scoreThem||0);
        return`<span class="set-chip ${w?'w':'l'}">S${i+1}: ${s.scoreUs}-${s.scoreThem}</span>`;
      }).join('');
      scoreHTML=`<div class="court-score ${matchWon?'score-win':matchLost?'score-loss':''}">
        <div>${sw}-${sl}</div>
        <div class="set-chips">${setChips}</div>
        ${(!matchWon&&!matchLost)?'<div style="font-size:9px;letter-spacing:1px;color:var(--gray);margin-top:2px;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;">IN PLAY</div>':''}
      </div>`;
    }else{
      scoreHTML=`<div class="court-score score-pending">–</div>`;
    }

    courtsHTML+=`<div class="court-row">
      <span class="ct-badge ct-${c.court}">CT${c.court}</span>
      <div class="court-pair">${p1} &amp; ${p2}<div class="court-opp">vs ${opp}</div></div>
      ${scoreHTML}
    </div>`;
  });

  const dualScoreHTML=hasAnyScores
    ?`<div class="dual-result">${leonMatches}–${oppMatches}<div class="dual-result-lbl">${inProgress>0?'MATCHES (LIVE)':'MATCHES WON'}</div></div>`
    :`<div class="dual-result" style="font-size:14px;opacity:0.6;line-height:1.2;">STARTING<br>SOON</div>`;

  container.innerHTML=`<div class="today-card">
    <div class="today-header">
      <div>
        <div class="today-matchup">LEON vs ${opp.toUpperCase()}</div>
        <div class="today-date">${fmtDate(today)} · ${assignment.type==='scrimmage'?'SCRIMMAGE':'DUAL'}</div>
      </div>
      ${dualScoreHTML}
    </div>
    <div class="court-list">${courtsHTML||'<div class="empty">Lineup loading...</div>'}</div>
  </div>`;
}

// ── UPCOMING DUALS ──
function renderUpcoming(){
  const today=td();
  const container=document.getElementById('upcoming-container');

  // From schedule node + future assignments
  const upcoming=[];

  // Future schedule entries
  D.schedule.filter(s=>s.date>today).forEach(s=>{
    upcoming.push({date:s.date,opponent:s.opponent||'TBD',type:'gameday',source:'schedule'});
  });

  // Future assignments not already in schedule
  Object.values(D.assignments).filter(a=>a.date>today&&(a.type==='gameday'||a.type==='scrimmage')).forEach(a=>{
    if(!upcoming.find(u=>u.date===a.date&&u.opponent===a.opponent)){
      upcoming.push({date:a.date,opponent:a.opponent||'TBD',type:a.type,source:'assignment'});
    }
  });

  upcoming.sort((a,b)=>a.date.localeCompare(b.date));

  if(!upcoming.length){
    container.innerHTML=`<div class="no-game">
      <div class="no-game-icon">📅</div>
      <div class="no-game-title">No Upcoming Duals</div>
      <div class="no-game-sub">Check back soon for the schedule</div>
    </div>`;
    return;
  }

  container.innerHTML=upcoming.slice(0,6).map(u=>{
    const[y,m,d]=u.date.split('-');
    const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const typeLabel=u.type==='scrimmage'?'Scrimmage':'Season Dual';
    const typeClass=u.type==='scrimmage'?'type-scrimmage':'type-gameday';
    return`<div class="dual-card">
      <div class="dual-date-block">
        <div class="dual-month">${months[parseInt(m)-1]}</div>
        <div class="dual-day">${parseInt(d)}</div>
      </div>
      <div class="dual-info">
        <div class="dual-opp">vs ${u.opponent.toUpperCase()}</div>
        <div class="dual-meta"><span class="dual-type-badge ${typeClass}">${typeLabel}</span></div>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
