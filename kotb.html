<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tally KotB has moved</title>
<meta name="robots" content="noindex">
<!-- Instant redirect. This old scoring app had no rating engine, so games scored
     here were never rated. It is retired. The live, rating-enabled app is at
     courtsense.app/kotb. Belt-and-suspenders: meta refresh + JS replace below. -->
<meta http-equiv="refresh" content="0; url=https://courtsense.app/kotb/">
<style>
  html,body{margin:0;height:100%;background:#0f2347;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;text-align:center;}
  .card{max-width:420px;}
  h1{font-size:20px;margin:0 0 12px;letter-spacing:.5px;}
  p{font-size:15px;line-height:1.5;color:#cbd5e1;margin:0 0 18px;}
  a.btn{display:inline-block;background:#d4a843;color:#0f2347;font-weight:700;
    text-decoration:none;padding:13px 22px;border-radius:10px;font-size:15px;}
  a.plain{color:#d4a843;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Tally KotB has moved to courtsense.app/kotb</h1>
      <p>Redirecting you now. If you are not redirected,
         <a class="plain" href="https://courtsense.app/kotb/">tap here</a>.</p>
      <a class="btn" href="https://courtsense.app/kotb/">Go to courtsense.app/kotb</a>
    </div>
  </div>
<script>
  // JS redirect fallback in case meta refresh is blocked. replace() so this
  // retired page does not stay in browser history / back-button reachable.
  window.location.replace('https://courtsense.app/kotb/');
</script>
</body>
</html>
